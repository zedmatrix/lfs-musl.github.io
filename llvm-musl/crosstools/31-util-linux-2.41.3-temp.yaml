package:
  name: util-linux-temp
  version: 2.41.3
  rel: 1
  archive: false
  delete: true

sources:
  - url: https://www.kernel.org/pub/linux/utils/util-linux/v2.41/util-linux-2.41.3.tar.xz
    sha256: 3330d873f0fceb5560b89a7dc14e4f3288bbd880e96903ed9b50ec2b5799e58b
    md5: d2faa85303dea29e7f6ee40a9465e528

prepare: |
  mkdir -pv /var/lib/hwclock &&
  ./configure --libdir=/usr/lib --runstatedir=/run --disable-chfn-chsh --disable-login --disable-nologin \
    --disable-su --disable-setpriv --disable-runuser --disable-pylibmount --disable-liblastlog2 \
    --without-python ADJTIME_PATH=/var/lib/hwclock/adjtime --docdir=/usr/share/doc/util-linux-${PKGVER}

build: |
  make

install: |
  make install
