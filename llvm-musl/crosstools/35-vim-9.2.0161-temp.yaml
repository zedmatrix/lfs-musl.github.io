package:
    name: vim-temp
    version: 9.2.0161
    rel: 1
    archive: false
    delete: true

sources:
    - url: https://github.com/vim/vim/archive/v9.2.0161/vim-9.2.0161.tar.gz
      sha256: 613482dfda905b5795afc0a5481f03aeb5a5d874bbddb6cc3f92a06c5c0d03cf
      md5: f6369455ad984b867977268fb8503c48

prepare: |
  echo '#define SYS_VIMRC_FILE "/etc/vimrc"' >> src/feature.h;
  ./configure --prefix=/usr

build: |
  make

install: |
  make install

final: |
  ln -sv ../vim/vim92/doc /usr/share/doc/vim-9.2.0161;
  ${YSRC}/config-vim.sh
