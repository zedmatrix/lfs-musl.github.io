package:
  name: python-temp
  version: 3.14.3
  rel: 1
  archive: false
  delete: true

sources:
  - url: https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tar.xz
    sha256: a97d5549e9ad81fe17159ed02c68774ad5d266c72f8d9a0b5a9c371fe85d902b
    md5: ef513dcb836d219ae0e2b16ac9c87d0f

prepare: |
  ./configure --prefix=/usr --enable-shared --without-ensurepip --without-static-libpython \
    --enable-optimizations --disable-test-modules

build: |
  make PROFILE_TASK='-m test --pgo -i test_fma_zero_result -i test_locale_caching -i test_locale_compiled'

install: |
  make install
