package:
  name: musl-temp
  version: 1.2.5
  rel: 1
  archive: false
  delete: true

sources:
  - url: https://musl.libc.org/releases/musl-1.2.5.tar.gz
    md5: ac5cfde7718d0547e224247ccfe59f18
    sha256: a9a118bbe84d8764da0ea0d28b3ab3fae8477fc7e4085d90102b8596fc7c75e4

patches:
  - url: https://trak4.com/musl-from-scratch/musl-packages/musl-1.2.5-iconv-fix.patch
    sha256: c0ffd0493dcde91850e39428a31577892aad20e83bc4bf4a5c37350649ce7932
    md5: 952e83c12a192b35d3038bd76242119a
  - url: https://trak4.com/musl-from-scratch/musl-packages/musl-1.2.5-rpmalloc.patch
    sha256: 3240f67b6049a6eaa7a42b18d9a3d447f74649acb8defb4d369ded997fd7b11f
    md5: 57e25622ef642b5564952cd52194e501

prepare: |
  ln -sfv ../lib/ld-musl-x86_64.so.1 $LFS/lib64;
  ln -sfv ../lib/ld-musl-x86_64.so.1 $LFS/lib64/ld-lsb-x86-64.so.3;
  ./configure --prefix=/usr --target=$LFS_TGT --build=x86_64-pc-linux-gnu --with-malloc=rpmalloc --disable-wrapper

build: |
  make

install: |
  make DESTDIR=$LFS install

final: |
  echo 'int main(){}' | $LFS_TGT-gcc -xc - ;
  readelf -l a.out | grep ld-musl
