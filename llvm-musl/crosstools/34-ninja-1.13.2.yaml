package:
  name: ninja-temp
  version: 1.13.2
  rel: 1
  archive: false
  delete: true

sources:
  - url: https://github.com/ninja-build/ninja/archive/v1.13.2/ninja-1.13.2.tar.gz
    sha256: 974d6b2f4eeefa25625d34da3cb36bdcebe7fbce40f4c16ac0835fd1c0cbae17
    md5: 76c00637fde44909cd7d56f8d73f2042

prepare: |
  ${YSRC}/ninja-jobs-patch.sh

build: |
  python3 configure.py --bootstrap --verbose

install: |
  install -vm755 ninja /usr/bin/

final: |
  install -vDm644 misc/bash-completion /usr/share/bash-completion/completions/ninja &&
  install -vDm644 misc/zsh-completion /usr/share/zsh/site-functions/_ninja
