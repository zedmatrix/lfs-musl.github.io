package:
  name: binutils-pass2
  version: 2.45.1
  rel: 1
  archive: false
  delete: true

sources:
  - url: https://sourceware.org/pub/binutils/releases/binutils-2.45.1.tar.xz
    sha256: 5fe101e6fe9d18fdec95962d81ed670fdee5f37e3f48f0bef87bddf862513aa5
    md5:

prepare: |
  sed '6031s/$add_dir//' -i ltmain.sh &&
  mkdir -v Ybuild && cd Ybuild && ../configure --prefix=/usr --build=$(../config.guess) \
    --host=$LFS_TGT --disable-nls --enable-shared --enable-gprofng=no --disable-werror --enable-64-bit-bfd \
    --enable-new-dtags --enable-default-hash-style=gnu

build: |
  cd Ybuild && make

install: |
  cd Ybuild && make DESTDIR=$LFS install &&
  rm -v $LFS/usr/lib/lib{bfd,ctf,ctf-nobfd,opcodes,sframe}.la
