package:
  name: xz-temp
  version: 5.8.2
  rel: 1
  archive: false
  delete: true

sources:
  - url: https://github.com//tukaani-project/xz/releases/download/v5.8.2/xz-5.8.2.tar.xz
    sha256: 890966ec3f5d5cc151077879e157c0593500a522f413ac50ba26d22a9a145214
    md5: 87c8bb8addf7189d3a51f6a5f03163fc

prepare: |
  ./configure --prefix=/usr --host=$LFS_TGT --build=$(build-aux/config.guess) \
    --docdir=/usr/share/doc/xz-${PKGVER}

build: |
  make

install: |
  make DESTDIR=$LFS install &&
  rm -v $LFS/usr/lib/liblzma.la
